<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Before After Motion</title>

<style>
html,body{
margin:0;
background:black;
height:100%;
overflow:hidden;
font-family:system-ui;
}

#viewer{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

img{
position:absolute;
max-width:100vw;
max-height:100vh;
object-fit:contain;
transition:opacity .6s;
}

#after{opacity:0}

#menu{
position:fixed;
inset:0;
background:#000000ee;
display:none;
align-items:center;
justify-content:center;
color:white;
padding:20px;
}

#menuBox{
max-width:420px;
width:100%;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#2ecc71;
color:white;
font-size:16px;
}

#debug{
position:fixed;
top:0;
left:0;
right:0;
background:#000c;
color:#00ffa2;
font-family:monospace;
font-size:12px;
padding:6px;
z-index:9999;
}

#help{
position:fixed;
inset:0;
background:#000000f0;
color:white;
display:none;
align-items:center;
justify-content:center;
padding:25px;
text-align:center;
z-index:10000;
}
</style>
</head>

<body>

<div id="viewer">
<img id="before">
<img id="after">
</div>

<div id="debug">initialisation…</div>

<div id="menu">
<div id="menuBox">
<label>Image avant</label>
<input type="file" id="inputBefore" accept="image/*">
<label>Image après</label>
<input type="file" id="inputAfter" accept="image/*">
<button id="save">Valider</button>
</div>
</div>

<div id="help">
<div>
<h2>Autorisation capteurs nécessaire</h2>
<p id="helpText"></p>
<button onclick="retrySensors()">Activer les capteurs</button>
</div>
</div>

<script>
const STORAGE_BEFORE="img_before";
const STORAGE_AFTER="img_after";

const imgBefore=document.getElementById("before");
const imgAfter=document.getElementById("after");
const debug=document.getElementById("debug");

let showingAfter=false;

/* =======================
   LOAD IMAGES
======================= */

function loadImages(){
const b=localStorage.getItem(STORAGE_BEFORE);
const a=localStorage.getItem(STORAGE_AFTER);
if(b&&a){
imgBefore.src=b;
imgAfter.src=a;
}
}
loadImages();

/* =======================
   SECRET MENU
======================= */

let lastTap=0;
document.addEventListener("touchend",()=>{
const now=Date.now();
if(now-lastTap<350){
document.getElementById("menu").style.display="flex";
}
lastTap=now;
});

document.getElementById("save").onclick=async()=>{
const b=document.getElementById("inputBefore").files[0];
const a=document.getElementById("inputAfter").files[0];
if(!b||!a)return alert("Choisir deux images");

const b64=await toBase64(b);
const a64=await toBase64(a);

localStorage.setItem(STORAGE_BEFORE,b64);
localStorage.setItem(STORAGE_AFTER,a64);

loadImages();
document.getElementById("menu").style.display="none";
};

function toBase64(file){
return new Promise(r=>{
const reader=new FileReader();
reader.onload=()=>r(reader.result);
reader.readAsDataURL(file);
});
}

/* =======================
   IMAGE SWITCH
======================= */

function switchImages(){
showingAfter=!showingAfter;
imgBefore.style.opacity=showingAfter?0:1;
imgAfter.style.opacity=showingAfter?1:0;
}

/* =======================
   SENSOR SYSTEM
======================= */

let orientationActive=false;
let motionActive=false;

let gamma=0;
let accelX=0;

let seq=[];
let lastStep=0;

const ANGLE=28;
const RESET_TIME=1800;

function updateSequence(dir){
const now=Date.now();
if(now-lastStep>RESET_TIME) seq=[];
lastStep=now;

const last=seq[seq.length-1];
if(last===dir) return;

seq.push(dir);
if(seq.length>6) seq.shift();

if(seq.join("")==="LRLRLR"){
seq=[];
switchImages();
}
}

function handleOrientation(e){
gamma=e.gamma||0;
detectSide();
}

function handleMotion(e){
if(!e.accelerationIncludingGravity)return;
accelX=e.accelerationIncludingGravity.x||0;

if(Math.abs(accelX)>4){
const dir=accelX>0?"R":"L";
updateSequence(dir);
}
}

function detectSide(){
let side="C";
if(gamma<-ANGLE) side="L";
if(gamma>ANGLE) side="R";

if(side==="L"||side==="R"){
updateSequence(side);
}
}

/* =======================
   PERMISSION SYSTEM
======================= */

async function enableSensors(){

debug.innerHTML="demande capteurs…";

try{

if(typeof DeviceOrientationEvent!=="undefined" &&
typeof DeviceOrientationEvent.requestPermission==="function"){

const res=await DeviceOrientationEvent.requestPermission();
if(res==="granted"){
window.addEventListener("deviceorientation",handleOrientation);
orientationActive=true;
}

}else{
window.addEventListener("deviceorientation",handleOrientation);
orientationActive=true;
}

}catch(e){}

/* fallback motion */

try{
window.addEventListener("devicemotion",handleMotion);
motionActive=true;
}catch(e){}

startSensorWatchdog();
}

document.addEventListener("touchstart",enableSensors,{once:true});

function retrySensors(){
document.getElementById("help").style.display="none";
enableSensors();
}

/* =======================
   SENSOR WATCHDOG
======================= */

let sensorStarted=false;
let sensorTimer;

function startSensorWatchdog(){
sensorStarted=true;
sensorTimer=setTimeout(()=>{
if(Math.abs(gamma)<1 && Math.abs(accelX)<0.5){
showHelp();
}
},3000);
}

function showHelp(){
const help=document.getElementById("help");
const text=document.getElementById("helpText");

const ua=navigator.userAgent;

if(/iPhone|iPad/.test(ua)){
text.innerHTML=
"Active : Réglages iOS → Safari → Mouvement et orientation";
}
else if(ua.includes("Brave")){
text.innerHTML=
"Dans Brave : icône paramètres du site → Autoriser capteurs / mouvement.";
}
else{
text.innerHTML=
"Autorise les capteurs pour ce site dans les paramètres du navigateur.";
}

help.style.display="flex";
}

/* =======================
   DEBUG
======================= */

setInterval(()=>{
debug.innerHTML=
"gamma: "+gamma.toFixed(1)+"°<br>"+
"accelX: "+accelX.toFixed(2)+"<br>"+
"orientationActive: "+orientationActive+"<br>"+
"motionActive: "+motionActive+"<br>"+
"sequence: "+seq.join("");
},100);
</script>

</body>
</html>
