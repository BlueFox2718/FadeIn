<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Before / After</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  width: 100%;
  overflow: hidden;
  touch-action: manipulation;
  font-family: system-ui, -apple-system, sans-serif;
}

#viewer {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
}

img.fullscreen {
  position: absolute;
  max-width: 100vw;
  max-height: 100vh;
  object-fit: contain;
  transition: opacity 600ms ease;
}

#imgBefore { opacity: 1; }
#imgAfter  { opacity: 0; }

/* Menu secret */
#secretMenu {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  color: white;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}

.menuCard {
  width: 100%;
  max-width: 420px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #2ecc71;
  color: white;
}

/* Message gyroscope */
#gyroWarning {
  display: none;
  background: #ffcc00;
  color: black;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 14px;
}

/* DEBUG GYRO */
#debug {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.65);
  color: #00ff9c;
  font-family: monospace;
  font-size: 12px;
  padding: 8px;
  z-index: 9999;
  line-height: 1.4em;
}
</style>
</head>

<body>

<div id="viewer">
  <img id="imgBefore" class="fullscreen">
  <img id="imgAfter" class="fullscreen">
</div>

<div id="debug">
gyro: en attente<br>
</div>

<div id="secretMenu">
  <div class="menuCard">

    <div id="gyroWarning">
      Attention, le gyroscope n'est pas activé sur cette page web.
      Merci de donner les autorisations nécessaires dans les paramètres de votre navigateur / téléphone.
    </div>

    <label>Image avant</label>
    <input type="file" id="beforeInput" accept="image/*">

    <label>Image après</label>
    <input type="file" id="afterInput" accept="image/*">

    <button id="saveBtn">Valider</button>
  </div>
</div>

<script>
const STORAGE_BEFORE = "image_before";
const STORAGE_AFTER  = "image_after";

const imgBefore = document.getElementById("imgBefore");
const imgAfter = document.getElementById("imgAfter");
const menu = document.getElementById("secretMenu");
const debug = document.getElementById("debug");
const gyroWarning = document.getElementById("gyroWarning");

let showingAfter = false;

/* Détection gyro */
let gyroDetected = false;
let gyroCheckStarted = false;

/* Charger images */
function loadImages() {
  const before = localStorage.getItem(STORAGE_BEFORE);
  const after = localStorage.getItem(STORAGE_AFTER);

  if (before && after) {
    imgBefore.src = before;
    imgAfter.src = after;
  }
}
loadImages();

/* Double tap */
let lastTap = 0;
document.addEventListener("touchend", () => {
  const now = Date.now();
  if (now - lastTap < 350) openMenu();
  lastTap = now;
});

function openMenu() {
  menu.style.display = "flex";

  if (!gyroDetected) {
    gyroWarning.style.display = "block";
  }
}

function closeMenu() {
  menu.style.display = "none";
}

/* Upload */
document.getElementById("saveBtn").addEventListener("click", async () => {
  const beforeFile = document.getElementById("beforeInput").files[0];
  const afterFile = document.getElementById("afterInput").files[0];

  if (!beforeFile || !afterFile) {
    alert("Choisir les deux images.");
    return;
  }

  const beforeData = await fileToBase64(beforeFile);
  const afterData = await fileToBase64(afterFile);

  localStorage.setItem(STORAGE_BEFORE, beforeData);
  localStorage.setItem(STORAGE_AFTER, afterData);

  loadImages();
  closeMenu();
});

function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

/* Transition */
function switchImages() {
  showingAfter = !showingAfter;

  if (showingAfter) {
    imgBefore.style.opacity = 0;
    imgAfter.style.opacity = 1;
  } else {
    imgBefore.style.opacity = 1;
    imgAfter.style.opacity = 0;
  }
}

/* Gyroscope */
let motionEnabled = false;
let sequence = [];
let lastStepTime = 0;

const LEFT_THRESHOLD = -30;
const RIGHT_THRESHOLD = 30;
const TIME_RESET = 2000;

let currentSide = "CENTER";

async function enableMotionIfNeeded() {
  if (motionEnabled) return;

  debug.innerHTML = "demande permission gyro...";

  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      debug.innerHTML = "permission: " + res;
      if (res === "granted") {
        window.addEventListener("deviceorientation", handleOrientation);
        motionEnabled = true;
      }
    } catch (e) {
      debug.innerHTML = "erreur permission";
    }
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
    motionEnabled = true;
    debug.innerHTML = "gyro actif (android ou navigateur compatible)";
  }

  /* Vérifie si gyro fonctionne réellement */
  if (!gyroCheckStarted) {
    gyroCheckStarted = true;

    setTimeout(() => {
      if (!gyroDetected) {
        gyroWarning.style.display = "block";
      }
    }, 3000);
  }
}

document.addEventListener("touchstart", enableMotionIfNeeded);

function handleOrientation(event) {
  const gamma = event.gamma ?? 0;
  const beta = event.beta ?? 0;
  const now = Date.now();

  if (Math.abs(gamma) > 0.1 || Math.abs(beta) > 0.1) {
    gyroDetected = true;
  }

  let side = "CENTER";
  if (gamma < LEFT_THRESHOLD) side = "L";
  else if (gamma > RIGHT_THRESHOLD) side = "R";

  if (now - lastStepTime > TIME_RESET) {
    sequence = [];
  }

  if (side !== currentSide && (side === "L" || side === "R")) {
    sequence.push(side);
    lastStepTime = now;

    if (sequence.length > 6) sequence.shift();

    const target = ["L","R","L","R","L","R"];
    if (sequence.length === 6 &&
        sequence.every((v,i)=>v===target[i])) {
      sequence = [];
      switchImages();
    }
  }

  currentSide = side;

  debug.innerHTML =
    "gamma (gauche/droite): " + gamma.toFixed(1) + "°<br>" +
    "beta (avant/arrière): " + beta.toFixed(1) + "°<br>" +
    "side: " + side + "<br>" +
    "sequence: " + sequence.join(" ") + "<br>" +
    "threshold L/R: " + LEFT_THRESHOLD + " / " + RIGHT_THRESHOLD;
}
</script>

</body>
</html>
