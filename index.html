<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Before / After</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  height: 100%;
  width: 100%;
  overflow: hidden;
  touch-action: manipulation;
  font-family: system-ui, -apple-system, sans-serif;
}

/* Zone d'affichage */
#viewer {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
}

img.fullscreen {
  position: absolute;
  max-width: 100vw;
  max-height: 100vh;
  object-fit: contain;
  transition: opacity 600ms ease;
}

#imgBefore { opacity: 1; }
#imgAfter  { opacity: 0; }

/* Menu secret */
#secretMenu {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  color: white;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}

.menuCard {
  width: 100%;
  max-width: 420px;
}

label {
  display: block;
  margin-top: 16px;
  font-size: 14px;
}

input[type=file] {
  width: 100%;
  margin-top: 6px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #2ecc71;
  color: white;
}
</style>
</head>

<body>

<div id="viewer">
  <img id="imgBefore" class="fullscreen">
  <img id="imgAfter" class="fullscreen">
</div>

<div id="secretMenu">
  <div class="menuCard">
    <label>Image avant</label>
    <input type="file" id="beforeInput" accept="image/*">

    <label>Image après</label>
    <input type="file" id="afterInput" accept="image/*">

    <button id="saveBtn">Valider</button>
  </div>
</div>

<script>
const STORAGE_BEFORE = "image_before";
const STORAGE_AFTER  = "image_after";

const imgBefore = document.getElementById("imgBefore");
const imgAfter = document.getElementById("imgAfter");
const menu = document.getElementById("secretMenu");

let showingAfter = false;

/* Charger depuis localStorage */
function loadImages() {
  const before = localStorage.getItem(STORAGE_BEFORE);
  const after = localStorage.getItem(STORAGE_AFTER);

  if (before && after) {
    imgBefore.src = before;
    imgAfter.src = after;
  } else {
    imgBefore.src = "";
    imgAfter.src = "";
  }
}
loadImages();

/* Double tap pour menu secret */
let lastTap = 0;
document.addEventListener("touchend", () => {
  const now = Date.now();
  if (now - lastTap < 350) {
    openMenu();
  }
  lastTap = now;
});

function openMenu() {
  menu.style.display = "flex";
}

function closeMenu() {
  menu.style.display = "none";
}

/* Upload images */
document.getElementById("saveBtn").addEventListener("click", async () => {
  const beforeFile = document.getElementById("beforeInput").files[0];
  const afterFile = document.getElementById("afterInput").files[0];

  if (!beforeFile || !afterFile) {
    alert("Choisir les deux images.");
    return;
  }

  const beforeData = await fileToBase64(beforeFile);
  const afterData = await fileToBase64(afterFile);

  localStorage.setItem(STORAGE_BEFORE, beforeData);
  localStorage.setItem(STORAGE_AFTER, afterData);

  loadImages();
  closeMenu();
});

function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

/* Transition */
function switchImages() {
  if (!imgBefore.src || !imgAfter.src) return;

  showingAfter = !showingAfter;

  if (showingAfter) {
    imgBefore.style.opacity = 0;
    imgAfter.style.opacity = 1;
  } else {
    imgBefore.style.opacity = 1;
    imgAfter.style.opacity = 0;
  }
}

/* Gyroscope logic */
let motionEnabled = false;
let sequence = [];
let lastTriggerTime = 0;

const LEFT_THRESHOLD = -35;
const RIGHT_THRESHOLD = 35;
const MAX_STEP_DELAY = 1500;

async function enableMotionIfNeeded() {
  if (motionEnabled) return;

  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === "granted") {
        window.addEventListener("deviceorientation", handleOrientation);
        motionEnabled = true;
      }
    } catch {}
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
    motionEnabled = true;
  }
}

document.addEventListener("touchstart", enableMotionIfNeeded);

/* Détection gauche/droite uniquement */
function handleOrientation(event) {
  const gamma = event.gamma; // inclinaison gauche/droite
  const now = Date.now();

  if (now - lastTriggerTime > MAX_STEP_DELAY) {
    sequence = [];
  }

  let direction = null;

  if (gamma < LEFT_THRESHOLD) direction = "L";
  if (gamma > RIGHT_THRESHOLD) direction = "R";

  if (!direction) return;

  const last = sequence[sequence.length - 1];
  if (direction === last) return;

  sequence.push(direction);
  lastTriggerTime = now;

  if (sequence.length > 6) {
    sequence.shift();
  }

  const target = ["L","R","L","R","L","R"];

  if (sequence.length === 6 &&
      sequence.every((v,i)=>v===target[i])) {
    sequence = [];
    switchImages();
  }
}
</script>

</body>
</html>
