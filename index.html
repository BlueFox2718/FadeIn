<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Shake Switch</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
    font-family: sans-serif;
}

#viewer {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
}

img.display {
    position: absolute;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.6s ease;
}

#imgAfter {
    opacity: 0;
}

#secretMenu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    color: white;
    display: none;
    z-index: 10;
    padding: 20px;
    box-sizing: border-box;
}

.menuBox {
    max-width: 420px;
    margin: auto;
    margin-top: 10vh;
}

input, button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    font-size: 16px;
}

button {
    cursor: pointer;
}

#permissionBox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    color: white;
    display: none;
    z-index: 20;
    text-align: center;
    padding: 30px;
}
</style>
</head>

<body>

<div id="viewer">
    <img id="imgBefore" class="display">
    <img id="imgAfter" class="display">
</div>

<div id="secretMenu">
    <div class="menuBox">
        <h2>Menu secret</h2>

        <label>Image avant</label>
        <input type="file" id="beforeInput" accept="image/*">

        <label>Image après</label>
        <input type="file" id="afterInput" accept="image/*">

        <button id="validateBtn">Valider</button>
        <button id="cancelBtn">Annuler</button>
    </div>
</div>

<div id="permissionBox">
    <h2>Autorisation requise</h2>
    <p>Le navigateur bloque l'accès aux capteurs de mouvement.</p>
    <button id="enableMotion">Autoriser les capteurs</button>
</div>

<script>
const STORAGE_BEFORE = "image_before";
const STORAGE_AFTER = "image_after";

const imgBefore = document.getElementById("imgBefore");
const imgAfter = document.getElementById("imgAfter");
const secretMenu = document.getElementById("secretMenu");
const permissionBox = document.getElementById("permissionBox");

let showingAfter = false;

// Charger images depuis localStorage
function loadImages() {
    const before = localStorage.getItem(STORAGE_BEFORE);
    const after = localStorage.getItem(STORAGE_AFTER);

    if (before && after) {
        imgBefore.src = before;
        imgAfter.src = after;
    }
}
loadImages();

// Upload images
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

document.getElementById("validateBtn").onclick = async () => {
    const beforeFile = document.getElementById("beforeInput").files[0];
    const afterFile = document.getElementById("afterInput").files[0];

    if (beforeFile) {
        const data = await fileToBase64(beforeFile);
        localStorage.setItem(STORAGE_BEFORE, data);
    }

    if (afterFile) {
        const data = await fileToBase64(afterFile);
        localStorage.setItem(STORAGE_AFTER, data);
    }

    loadImages();
    secretMenu.style.display = "none";
};

document.getElementById("cancelBtn").onclick = () => {
    secretMenu.style.display = "none";
};

// Double tap detection
let lastTap = 0;
document.body.addEventListener("touchend", e => {
    const now = Date.now();
    if (now - lastTap < 300) {
        secretMenu.style.display = "block";
    }
    lastTap = now;
});

// Animation switch
function switchImage() {
    showingAfter = !showingAfter;
    imgAfter.style.opacity = showingAfter ? "1" : "0";
}

// Détection mouvement robuste
let sequence = [];
const LEFT_THRESHOLD = -30;
const RIGHT_THRESHOLD = 30;

function processTilt(gamma) {
    let side = "CENTER";
    if (gamma < LEFT_THRESHOLD) side = "LEFT";
    if (gamma > RIGHT_THRESHOLD) side = "RIGHT";

    const last = sequence[sequence.length - 1];
    if (side !== "CENTER" && side !== last) {
        sequence.push(side);
        if (sequence.length > 6) sequence.shift();

        const pattern = sequence.join("");
        if (pattern === "LEFTRIGHTLEFTRIGHTLEFTRIGHT") {
            switchImage();
            sequence = [];
        }
    }
}

// Détection inertie
let motionDetected = false;
let lastMotionTime = Date.now();

function markMotion() {
    motionDetected = true;
    lastMotionTime = Date.now();
}

// Listener orientation
function handleOrientation(event) {
    if (event.gamma === null) return;
    markMotion();
    processTilt(event.gamma);
}

// Listener motion
function handleMotion(event) {
    if (!event.accelerationIncludingGravity) return;
    const a = event.accelerationIncludingGravity;
    if (Math.abs(a.x) > 0.5 || Math.abs(a.y) > 0.5) {
        markMotion();
    }
}

// Vérification capteurs actifs
setInterval(() => {
    if (!motionDetected && Date.now() - lastMotionTime > 3000) {
        permissionBox.style.display = "block";
    }
}, 2000);

// Permissions iOS
async function requestMotionPermission() {
    try {
        if (typeof DeviceMotionEvent !== "undefined" &&
            typeof DeviceMotionEvent.requestPermission === "function") {
            const res = await DeviceMotionEvent.requestPermission();
            if (res !== "granted") return;
        }

        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== "granted") return;
        }

        permissionBox.style.display = "none";
        startSensors();
    } catch (e) {
        alert("Impossible d'activer les capteurs.");
    }
}

document.getElementById("enableMotion").onclick = requestMotionPermission;

// Démarrage capteurs
function startSensors() {
    window.addEventListener("deviceorientation", handleOrientation);
    window.addEventListener("devicemotion", handleMotion);
}

// Android / navigateurs compatibles
startSensors();
</script>

</body>
</html>
